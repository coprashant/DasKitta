version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: daskitta-postgres
    environment:
      POSTGRES_DB: meroshare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Passwordis@123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data