# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/meroshare_db
spring.datasource.username=postgres
spring.datasource.password=Passwordis@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
# NOTE: No leading space before the value — Spring trims property values,
# but let's be explicit. Must be >= 32 characters for AES-256.
app.jwt.secret=this_is_a_very_super_secret_key_that_noone_knows_haha_@123
app.jwt.expiration-ms=86400000

# CORS (allow React frontend)
app.cors.allowed-origins=https://daskitta.vercel.app,http://localhost:5173

# Meroshare External API base URL
meroshare.api.base-url=https://webbackend.cdsc.com.np/api

# Logging — reduce noise, keep service-level logs
logging.level.root=WARN
logging.level.com.meroshare.backend=INFO
logging.level.org.springframework.security=WARN