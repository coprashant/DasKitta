# Server
server.port=${PORT:8080}

# ── PostgreSQL Database ────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/meroshare_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Passwordis@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning for Neon's serverless Postgres
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:this_is_a_very_super_secret_key_that_noone_knows_haha_@123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ───────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://daskitta.vercel.app,http://localhost:5173}

# ── Meroshare External API ─────────────────────────────────────────────────────
meroshare.api.base-url=${MEROSHARE_BASE_URL:https://webbackend.cdsc.com.np/api}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.meroshare.backend=INFO
logging.level.org.springframework.security=WARN